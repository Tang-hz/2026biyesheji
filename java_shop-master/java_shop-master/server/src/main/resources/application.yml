server.port: 9100
server.servlet.context-path: /api
server.tomcat:
  threads:
    max: 500
    min-spare: 20
  max-connections: 10000

BASE_LOCATION: D:\毕业设计\java_shop-master\java_shop-master
DB_NAME: java_shop


spring:
  main:
    web-application-type: servlet

  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10

  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

    druid:
      initial-size: 5
      min-idle: 5
      maxActive: 300
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      validationQuery: SELECT 1
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      maxPoolPreparedStatementPerConnectionSize: 20
      filters: stat,slf4j
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      web-stat-filter:
        enabled: true
        url-pattern: "/*"
        exclusions: "*.js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        allow: 127.0.0.1
        deny: 192.168.1.73
        reset-enable: false
        login-username: admin
        login-password: 123
        url-pattern: "/druid/*"
        enabled: true

  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 1MB
      location: ${BASE_LOCATION}\server\upload\tmp
      enabled: true

  mvc:
    static-path-pattern: /staticfiles/**
    async:
      request-timeout: 30000
  web:
    resources:
      static-locations: file:${BASE_LOCATION}\server\upload

File:
  uploadPath: ${BASE_LOCATION}\server\upload

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    type-handlers-package: com.baomidou.mybatisplus.extension.handlers

logging:
  level:
    root: error
    org.springframework: error
    org.apache: error
    com.gk.study: debug

ai:
  provider: bailian
  bailian:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${BAILIAN_API_KEY}
    chat-model: qwen3.5-flash
    embedding-model: text-embedding-v3
    timeout-seconds: 120
    temperature: 0.2
  customer:
    memory:
      max-messages: 30

app:
  redis:
    chat-memory:
      key-prefix: "ai:chat:memory:"

rag:
  redis:
    stack-enabled: false
    index-name: java-shop-rag-index
    key-prefix: "rag:embedding:"
    embedding-dimension: 1024
  knowledge-pattern: classpath*:Rag/Knowledge/*.md
  max-segment-size: 600
  max-overlap-size: 80
  top-k: 6
  min-score: 0.5

knife4j:
  enable: true
  setting:
    enable-order: true
    order-type: controller
  ui:
    theme: white
    enable-search: true
    enable-group: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

alipay:
  app-id: 9021000163661482
  gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  private-key: 
  alipay-public-key: 
  notify-url: http://127.0.0.1:9100/api/pay/alipay/notify
  return-url: http://localhost:3000/pay/result

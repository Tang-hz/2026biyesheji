server.port: 9100
server.servlet.context-path: /api
server.tomcat:
  threads:
    max: 500
    min-spare: 20
  max-connections: 10000

BASE_LOCATION: D:\毕业设计\java_shop-master\java_shop-master
DB_NAME: java_shop


spring:
  main:
    web-application-type: servlet

  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10

  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

    druid:
      # 连接池的配置信息
      initial-size: 5
      min-idle: 5
      maxActive: 300
      # 配置获取连接等待超时的时间
      maxWait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      timeBetweenEvictionRunsMillis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      minEvictableIdleTimeMillis: 300000
      validationQuery: SELECT 1
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      # 打开PSCache，并且指定每个连接上PSCache的大小
      poolPreparedStatements: true
      maxPoolPreparedStatementPerConnectionSize: 20
      # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
      filters: stat,slf4j
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      # 配置DruidStatFilter
      web-stat-filter:
        enabled: true
        url-pattern: "/*"
        exclusions: "*.js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*"
      # 配置DruidStatViewServlet
      stat-view-servlet:
        # IP白名单(没有配置或者为空，则允许所有访问)
        allow: 127.0.0.1
        # IP黑名单 (存在共同时，deny优先于allow)
        deny: 192.168.1.73
        # 禁用HTML页面上的“Reset All”功能
        reset-enable: false
        # druid登录的账户名
        login-username: admin
        # druid登录的密码
        login-password: 123
        # 不要写2个*号！要1个！
        url-pattern: "/druid/*"
        #这里配true才能访问监控页面！
        enabled: true

  servlet:
    multipart:
      max-request-size: 10MB  # 上传文件总的最大值 默认10MB
      max-file-size: 1MB #单个文件最大值 默认1MB
      location: ${BASE_LOCATION}\server\upload\tmp # 临时上传目录
      enabled: true



  # 静态资源路径
  mvc:
    static-path-pattern: /staticfiles/**  # 别名
    async:
      request-timeout: 30000
  web:
    resources:
#      static-locations: classpath:/static
      static-locations: file:${BASE_LOCATION}\server\upload


File:
  uploadPath: ${BASE_LOCATION}\server\upload

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    # 使用 MyBatis-Plus 的 Spring Boot 类型处理器包，自动处理 LocalDateTime 等类型
    type-handlers-package: com.baomidou.mybatisplus.extension.handlers

logging:
  level:
    root: error
    org.springframework: error
    org.apache: error
    com.gk.study: debug


ai:
  # 提供方： bailian（阿里百炼 ）
  provider: bailian

  # 阿里百炼（OpenAI 兼容端点）
  bailian:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${BAILIAN_API_KEY}
    chat-model: qwen3.5-flash
    embedding-model: text-embedding-v3
    timeout-seconds: 120
    temperature: 0.2
  customer:
    memory:
      max-messages: 30

# AI 客服对话在 Redis 中的 key 前缀（与 spring.data.redis 使用同一连接）
app:
  redis:
    chat-memory:
      key-prefix: "ai:chat:memory:"

rag:
  # RAG 向量库：LangChain4j Redis 实现需 Redis Stack（RediSearch + RedisJSON）。普通 Redis 无 FT.* 命令。
  # false=内存向量（默认，可启动）；true=向量存 Redis（需先安装 Stack 并设好密码等）。
  redis:
    stack-enabled: false
    index-name: java-shop-rag-index
    key-prefix: "rag:embedding:"
    # 须与当前 Embedding 模型维度一致（百炼 text-embedding-v3 默认 1024）
    embedding-dimension: 1024
  # 知识库目录（src/main/resources/Rag/Knowledge）
  knowledge-pattern: classpath*:Rag/Knowledge/*.md
  # 文本分块参数：块越大语义越完整，块越小检索越精确
  max-segment-size: 600
  max-overlap-size: 80
  # 检索参数：返回前 topK 个片段 + 最小相似度阈值min-score
  top-k: 6
  min-score: 0.5

# ====================== Knife4j / SpringDoc 接口文档（须为根级，勿放在 rag 下）======================
knife4j:
  enable: true
  setting:
    enable-order: true
    order-type: controller
  ui:
    theme: white
    enable-search: true
    enable-group: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html